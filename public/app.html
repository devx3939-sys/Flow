<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 1rem; }
      form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
      input { flex: 1; padding: 0.6rem; }
      button { padding: 0.6rem 1rem; }
      iframe { width: 100%; height: calc(100vh - 110px); border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <form id="flow-form">
      <input id="flow-url" placeholder="https://example.com" required />
      <button type="submit">Open</button>
    </form>
    <iframe id="flow-frame" title="Flow proxied content"></iframe>
    <script src="/app/client.js" type="module"></script>
  </body>
</html>
